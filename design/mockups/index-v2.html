<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinil Oh's Club - Listening Sessions</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <style>
        /* ============================================
           DESIGN SYSTEM - Web Brutalism + Indie Web
           ============================================ */
        
        :root {
            --bg: #F1EAD8;
            --surface: #DBC091;
            --primary: #5C3E28;
            --dark: #27221C;
            
            --font-display: 'Courier New', 'Courier', monospace;
            --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            
            --spacing-unit: 8px;
            --border-width: 2px;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: var(--primary);
            font-family: var(--font-body);
            overflow: hidden;
        }
        
        /* ============================================
           TYPOGRAPHY
           ============================================ */
        
        h1, h2, h3 {
            font-family: var(--font-display);
            font-weight: 700;
            letter-spacing: -1px;
        }
        
        h1 {
            font-size: clamp(1.5rem, 5vw, 3rem);
            line-height: 1;
        }
        
        h2 {
            font-size: clamp(1rem, 3vw, 1.75rem);
        }
        
        h3 {
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: var(--spacing-unit);
        }
        
        p {
            line-height: 1.6;
            font-size: 0.95rem;
        }
        
        /* ============================================
           LAYOUT - App Shell
           ============================================ */
        
        body {
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: auto auto 1fr auto;
        }
        
        header {
            background: var(--primary);
            color: var(--bg);
            padding: calc(var(--spacing-unit) * 2.5);
            border-bottom: var(--border-width) solid var(--dark);
            position: relative;
            overflow: hidden;
        }
        
        header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 400px;
            height: 400px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 50%;
            pointer-events: none;
        }
        
        header > * {
            position: relative;
            z-index: 1;
        }
        
        .header-top {
            margin-bottom: var(--spacing-unit);
        }
        
        .logo {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 900;
            word-spacing: 0.2em;
        }
        

        
        header h1 {
            color: var(--surface);
            margin-bottom: var(--spacing-unit);
            text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.2);
        }
        
        header p {
            color: var(--bg);
            max-width: 90%;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        
        /* ============================================
           NAVIGATION - Brutalist Style
           ============================================ */
        
        nav.main-nav {
            display: flex;
            gap: 0;
            background: var(--primary);
            border-bottom: var(--border-width) solid var(--dark);
        }
        
        nav.main-nav a {
            flex: 1;
            padding: calc(var(--spacing-unit) * 1) calc(var(--spacing-unit) * 1.5);
            color: var(--bg);
            text-decoration: none;
            border-right: var(--border-width) solid var(--dark);
            font-family: var(--font-display);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
            transition: all 0.2s;
            cursor: pointer;
            text-align: center;
        }
        
        nav.main-nav a:last-child {
            border-right: none;
        }
        
        nav.main-nav a:hover,
        nav.main-nav a.active {
            background: var(--surface);
            color: var(--dark);
        }
        
        main {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0;
            height: 100%;
            overflow: hidden;
        }
        
        footer {
            background: var(--dark);
            color: var(--bg);
            padding: calc(var(--spacing-unit) * 1.5);
            border-top: var(--border-width) solid var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            flex-wrap: wrap;
            gap: var(--spacing-unit);
        }
        
        .footer-links {
            display: flex;
            gap: calc(var(--spacing-unit) * 2);
        }
        
        a {
            color: var(--surface);
            text-decoration: none;
            border-bottom: var(--border-width) solid transparent;
            transition: border-color 0.2s;
        }
        
        a:hover {
            border-bottom-color: var(--surface);
        }
        
        footer a {
            color: var(--bg);
            border-bottom-color: transparent;
        }
        
        footer a:hover {
            border-bottom-color: var(--bg);
        }
        
        /* ============================================
           DESKTOP LAYOUT (Dual Panel for Songs)
           ============================================ */
        
        @media (min-width: 768px) {
            #songs-main {
                grid-template-columns: 300px 1fr;
                gap: var(--border-width);
                background: var(--primary);
            }
            
            #songs-main .playlist-panel, 
            #songs-main .detail-panel {
                border-right: var(--border-width) solid var(--primary);
                background: var(--bg);
                overflow-y: auto;
                overflow-x: hidden;
            }
            
            #songs-main .playlist-panel {
                border-right-color: var(--primary);
            }
            
            #songs-main .detail-panel {
                border-right: none;
            }
            
            #events-main {
                grid-template-columns: 1fr;
            }
        }
        
        /* ============================================
           PLAYLIST PANEL
           ============================================ */
        
        .playlist-panel {
            display: none;
        }
        
        @media (min-width: 768px) {
            .playlist-panel {
                display: flex;
                flex-direction: column;
            }
        }
        
        .playlist-header {
            padding: calc(var(--spacing-unit) * 2);
            border-bottom: var(--border-width) solid var(--primary);
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 10;
        }
        
        .playlist-header h3 {
            margin: 0;
            color: var(--dark);
        }
        
        .tracks-list {
            flex: 1;
            overflow-y: auto;
        }
        
        .track-item {
            padding: calc(var(--spacing-unit) * 1.5);
            border-bottom: var(--border-width) solid var(--surface);
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        
        .track-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--dark);
            transform: scaleY(0);
            transition: transform 0.2s;
            transform-origin: top;
        }
        
        .track-item:hover {
            background: var(--surface);
        }
        
        .track-item:hover::before {
            transform: scaleY(1);
        }
        
        .track-item.active {
            background: var(--surface);
        }
        
        .track-item.active::before {
            transform: scaleY(1);
        }
        
        .track-title {
            font-family: var(--font-display);
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 4px;
            color: var(--dark);
        }
        
        .track-artist {
            font-size: 0.8rem;
            color: var(--primary);
            opacity: 0.8;
        }
        
        .track-number {
            font-size: 0.75rem;
            color: var(--primary);
            opacity: 0.6;
            font-family: var(--font-display);
            margin-top: 4px;
        }
        
        /* ============================================
           DETAIL PANEL
           ============================================ */
        
        .detail-panel {
            display: none;
        }
        
        @media (min-width: 768px) {
            .detail-panel {
                display: flex;
                flex-direction: column;
                background: var(--bg);
                padding: calc(var(--spacing-unit) * 2);
                overflow-y: auto;
                padding-right: calc(var(--spacing-unit) * 3);
            }
        }
        
        .no-selection {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
            opacity: 0.6;
        }
        
        .no-selection p {
            max-width: 200px;
        }
        
        .track-detail {
            animation: fadeInUp 0.4s ease-out;
            display: flex;
            flex-direction: column;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .cover-art-container {
            margin-bottom: calc(var(--spacing-unit) * 3);
            overflow: hidden;
            max-width: 500px;
        }
        
        .cover-art {
            width: 100%;
            aspect-ratio: 1;
            background: var(--surface);
            border: var(--border-width) solid var(--primary);
            object-fit: cover;
            display: block;
            image-rendering: crisp-edges;
        }
        
        @media (min-width: 768px) {
            .track-detail {
                display: grid;
                grid-template-columns: 350px 1fr;
                gap: calc(var(--spacing-unit) * 2);
                align-items: start;
            }
            
            .cover-art-container {
                margin-bottom: 0;
                max-width: 100%;
                grid-row: 1 / 3;
            }
            
            .track-meta {
                margin-bottom: 0;
                grid-column: 2;
                grid-row: 1;
            }
            
            .tidal-player-container {
                grid-column: 2;
                grid-row: 2;
                margin-top: 0;
                padding-top: 0;
                border-top: none;
            }
        }
        
        @media (max-width: 767px) {
            .cover-art-container {
                max-width: 300px;
                margin: 0 auto calc(var(--spacing-unit) * 2);
            }
        }
        
        .cover-placeholder {
            width: 100%;
            aspect-ratio: 1;
            background: linear-gradient(135deg, var(--surface) 25%, transparent 25%, transparent 75%, var(--surface) 75%, var(--surface)),
                        linear-gradient(135deg, var(--surface) 25%, transparent 25%, transparent 75%, var(--surface) 75%, var(--surface));
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            background-color: var(--primary);
            border: var(--border-width) solid var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: var(--bg);
            text-align: center;
            padding: var(--spacing-unit);
            min-height: 200px;
        }
        
        @media (max-width: 767px) {
            .cover-placeholder {
                min-height: 300px;
            }
        }
        
        .track-meta {
            margin-bottom: calc(var(--spacing-unit) * 2);
        }
        
        .track-meta h2 {
            color: var(--dark);
            margin-bottom: var(--spacing-unit);
            border-bottom: var(--border-width) solid var(--primary);
            padding-bottom: var(--spacing-unit);
        }
        
        .meta-row {
            display: grid;
            grid-template-columns: 80px 1fr;
            gap: var(--spacing-unit);
            margin-bottom: calc(var(--spacing-unit) * 1.5);
            font-size: 0.9rem;
        }
        
        .meta-label {
            font-family: var(--font-display);
            font-weight: bold;
            color: var(--dark);
            text-transform: uppercase;
            font-size: 0.8rem;
        }
        
        .meta-value {
            color: var(--primary);
        }
        
        .meta-row {
            display: grid;
            grid-template-columns: 100px 1fr;
            gap: calc(var(--spacing-unit) * 1.5);
            margin-bottom: calc(var(--spacing-unit) * 2);
            font-size: 0.95rem;
            padding-bottom: calc(var(--spacing-unit) * 1);
            border-bottom: 1px solid var(--surface);
        }
        
        .meta-row:last-of-type {
            border-bottom: none;
        }
        
        .meta-label {
            font-family: var(--font-display);
            font-weight: 700;
            color: var(--dark);
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 1px;
        }
        
        .meta-value {
            color: var(--primary);
            font-weight: 500;
        }
        
        /* ============================================
           MOBILE LAYOUT (Card Overlay)
           ============================================ */
        
        @media (max-width: 767px) {
            body {
                grid-template-rows: auto auto 1fr auto;
            }
            
            main {
                grid-template-columns: 1fr;
                min-height: 0;
            }
            
            .playlist-panel {
                display: grid;
                grid-template-rows: auto 1fr;
                min-height: 0;
            }
            
            .playlist-header {
                padding: calc(var(--spacing-unit) * 2);
                border-bottom: var(--border-width) solid var(--primary);
                flex-shrink: 0;
            }
            
            .tracks-list {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: var(--border-width);
                padding: var(--border-width);
                background: var(--primary);
                overflow-y: auto;
                overflow-x: hidden;
                align-content: start;
                min-height: 0;
            }
            
            .track-item {
                display: flex;
                flex-direction: column;
                border: none;
                border: var(--border-width) solid var(--primary);
                background: var(--surface);
                padding: var(--spacing-unit);
                cursor: pointer;
                position: relative;
                overflow: visible;
            }
            
            .track-item::before {
                display: none;
            }
            
            .track-item.active {
                background: var(--primary);
                color: var(--bg);
                z-index: 100;
            }
            
            .track-item.active .track-title,
            .track-item.active .track-artist,
            .track-item.active .track-number {
                color: var(--bg);
            }
            
            .detail-panel {
                display: none;
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                top: auto;
                height: calc(100% - 60px);
                background: var(--bg);
                z-index: 1000;
                border-top: var(--border-width) solid var(--primary);
                border-radius: 12px 12px 0 0;
                animation: slideUpMobile 0.3s ease-out;
                padding: calc(var(--spacing-unit) * 2);
                overflow-y: auto;
                overflow-x: hidden;
                flex-direction: column;
            }
            
            .detail-panel.open {
                display: flex;
            }
            
            @keyframes slideUpMobile {
                from {
                    transform: translateY(100%);
                }
                to {
                    transform: translateY(0);
                }
            }
            
            .detail-close {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: calc(var(--spacing-unit) * 2);
                padding-bottom: calc(var(--spacing-unit) * 1.5);
                border-bottom: var(--border-width) solid var(--primary);
            }
            
            .detail-close h3 {
                margin: 0;
            }
            
            .close-btn {
                background: var(--primary);
                color: var(--bg);
                border: none;
                width: 32px;
                height: 32px;
                cursor: pointer;
                font-size: 1.2rem;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: all 0.2s;
                font-family: var(--font-display);
            }
            
            .close-btn:hover {
                background: var(--dark);
            }
            
            .cover-art-container {
                margin-bottom: calc(var(--spacing-unit) * 2);
            }
            
            .cover-art, .cover-placeholder {
                max-width: 300px;
                margin: 0 auto;
            }
        }
        
        /* ============================================
           SCROLLBAR STYLING
           ============================================ */
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--dark);
        }
        
        /* ============================================
           MODAL / POPUP - Club Info
           ============================================ */
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-unit);
            animation: fadeIn 0.2s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .modal.open {
            display: flex;
        }
        
        .modal-content {
            background: var(--bg);
            padding: calc(var(--spacing-unit) * 3);
            border: var(--border-width) solid var(--primary);
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            animation: scaleIn 0.3s ease-out;
            position: relative;
        }
        
        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: calc(var(--spacing-unit) * 2);
            border-bottom: var(--border-width) solid var(--primary);
            padding-bottom: var(--spacing-unit);
        }
        
        .modal-header h2 {
            margin: 0;
            color: var(--dark);
        }
        
        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--primary);
            font-family: var(--font-display);
            font-weight: bold;
            transition: color 0.2s;
        }
        
        .modal-close:hover {
            color: var(--dark);
        }
        
        .modal-body {
            color: var(--primary);
        }
        
        .modal-body p {
            margin-bottom: calc(var(--spacing-unit) * 1.5);
        }
        
        /* ============================================
           BUTTON STYLING
           ============================================ */
        
        button {
            background: var(--primary);
            color: var(--bg);
            border: var(--border-width) solid var(--primary);
            padding: calc(var(--spacing-unit) * 0.75) calc(var(--spacing-unit) * 1.5);
            cursor: pointer;
            font-family: var(--font-body);
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        
        button:hover {
            background: var(--dark);
            border-color: var(--dark);
        }
        
        .btn-secondary {
            background: transparent;
            color: var(--primary);
            border-color: var(--primary);
        }
        
        .btn-secondary:hover {
            background: var(--primary);
            color: var(--bg);
        }
        
        .btn-filter {
            background: transparent;
            color: var(--primary);
            border: var(--border-width) solid var(--primary);
            padding: calc(var(--spacing-unit) * 0.5) calc(var(--spacing-unit) * 1);
            font-size: 0.75rem;
            margin-right: var(--spacing-unit);
            text-transform: uppercase;
            font-family: var(--font-display);
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        
        .btn-filter:hover,
        .btn-filter.active {
            background: var(--primary);
            color: var(--bg);
        }
        
        /* ============================================
           TIDAL PLAYER INTEGRATION
           ============================================ */
        
        .tidal-player-container {
            margin-top: calc(var(--spacing-unit) * 2);
            padding-top: calc(var(--spacing-unit) * 1);
            border-top: var(--border-width) solid var(--primary);
            position: relative;
        }
        
        .player-label {
            font-family: var(--font-display);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--dark);
            margin-bottom: calc(var(--spacing-unit) * 0.75);
            display: block;
            font-weight: bold;
        }
        
        .tidal-embed-wrapper {
            position: relative;
            overflow: hidden;
            border-radius: 1px;
            animation: slideInPlayer 0.5s ease-out 0.3s both;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }
        
        @keyframes slideInPlayer {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .tidal-embed-wrapper iframe {
            display: block;
            border: var(--border-width) solid var(--primary);
            background: var(--surface);
            max-width: 100%;
            width: 100%;
            height: 120px;
        }
        
        @media (max-width: 767px) {
            .tidal-player-container {
                margin-top: calc(var(--spacing-unit) * 1.5);
                padding-top: calc(var(--spacing-unit) * 0.75);
            }
            
            .tidal-embed-wrapper iframe {
                height: 120px;
            }
        }
        
        /* ============================================
           EVENTS PAGE - MAP LAYOUT
           ============================================ */
        
        .events-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }
        
        .events-header {
            padding: calc(var(--spacing-unit) * 2);
            border-bottom: var(--border-width) solid var(--primary);
            background: var(--bg);
            flex-shrink: 0;
        }
        
        .events-header h2 {
            margin: 0 0 calc(var(--spacing-unit) * 1) 0;
            color: var(--dark);
        }
        
        .filters {
            display: flex;
            gap: var(--spacing-unit);
            flex-wrap: wrap;
            align-items: center;
        }
        
        .filters-label {
            font-family: var(--font-display);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--dark);
            font-weight: bold;
        }
        
        #map {
            flex: 1;
            width: 100%;
            border-bottom: var(--border-width) solid var(--primary);
        }
        
        .leaflet-container {
            font-family: var(--font-body);
        }
        
        .leaflet-popup-content-wrapper {
            background: var(--bg);
            border: var(--border-width) solid var(--primary);
            border-radius: 0;
            box-shadow: none;
        }
        
        .leaflet-popup-tip {
            background: var(--bg);
        }
        
        .leaflet-popup-content {
            margin: 0;
            width: auto !important;
        }
        
        .event-popup {
            padding: calc(var(--spacing-unit) * 1);
        }
        
        .event-popup h3 {
            margin: 0 0 var(--spacing-unit) 0;
            color: var(--dark);
            font-family: var(--font-display);
            font-size: 0.95rem;
        }
        
        .event-popup p {
            margin-bottom: var(--spacing-unit);
            font-size: 0.8rem;
        }
        
        .event-popup-venue {
            color: var(--primary);
            font-weight: bold;
            margin-bottom: calc(var(--spacing-unit) * 0.5);
        }
        
        .event-popup-date {
            color: var(--primary);
            font-size: 0.75rem;
            margin-bottom: calc(var(--spacing-unit) * 1);
        }
        
        .event-popup-link {
            display: inline-block;
            background: var(--primary);
            color: var(--bg);
            padding: calc(var(--spacing-unit) * 0.5) calc(var(--spacing-unit) * 1);
            text-decoration: none;
            border: var(--border-width) solid var(--primary);
            font-size: 0.7rem;
            text-transform: uppercase;
            font-family: var(--font-display);
            font-weight: bold;
            transition: all 0.2s;
            margin-right: var(--spacing-unit);
        }
        
        .event-popup-link:hover {
            background: var(--dark);
            border-color: var(--dark);
        }
        
        .events-info {
            padding: calc(var(--spacing-unit) * 2);
            background: var(--bg);
            border-top: var(--border-width) solid var(--primary);
            max-height: 150px;
            overflow-y: auto;
            flex-shrink: 0;
        }
        
        .event-item-compact {
            padding: calc(var(--spacing-unit) * 1);
            border-left: 3px solid var(--surface);
            margin-bottom: var(--spacing-unit);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .event-item-compact:hover {
            background: var(--surface);
            border-left-color: var(--primary);
        }
        
        .event-item-compact.active {
            background: var(--primary);
            border-left-color: var(--primary);
            color: var(--bg);
        }
        
        .event-item-compact.active h4 {
            color: var(--bg);
        }
        
        .event-item-compact.active p {
            color: var(--surface);
        }
        
        .event-item-compact h4 {
            margin: 0 0 2px 0;
            font-family: var(--font-display);
            font-size: 0.8rem;
            color: var(--dark);
        }
        
        .event-item-compact p {
            margin: 0;
            font-size: 0.7rem;
            color: var(--primary);
        }
        
        /* ============================================
           MARKER HIGHLIGHT
           ============================================ */
        
        .highlight-marker {
            filter: drop-shadow(0 0 8px rgba(219, 192, 145, 0.9)) brightness(1.2) !important;
        }
    </style>
</head>

        function init() {
            renderTracks();

            setSessionDate();
            setupClubInfo();

        function setSessionDate() {
            const today = new Date();
            const day = String(today.getDate()).padStart(2, '0');
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const year = today.getFullYear();
            document.getElementById('sessionDate').textContent = `${day}.${month}.${year}`;
        }

                </p>
            `;
        }

        // ============================================
        // PAGE NAVIGATION
        // ============================================
        
        function switchPage(pageName) {
            currentPage = pageName;
            
            // Hide all main elements
            document.getElementById('songs-main').style.display = 'none';
            document.getElementById('events-main').style.display = 'none';
            
            // Show selected main
            if (pageName === 'songs') {
                document.getElementById('songs-main').style.display = 'grid';
                document.getElementById('pageTitle').textContent = 'Listening Session';
            } else if (pageName === 'events') {
                document.getElementById('events-main').style.display = 'grid';
                document.getElementById('pageTitle').textContent = 'Local Events';
                
                // Initialize map if needed
                if (!map) {
                    setTimeout(() => {
                        initMap();
                    }, 100);
                }
            }
            
            // Update nav links
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active');
                if (link.dataset.page === pageName) {
                    link.classList.add('active');
                }
            });
        }

        // ============================================
        // MAP FUNCTIONALITY
        // ============================================
        
        function initMap() {
            map = L.map('map').setView([20.0858, -98.3611], 15);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors',
                maxZoom: 19
            }).addTo(map);
            
            venues.forEach(venue => {
                venue.events.forEach(event => {
                    const shouldShow = filterEvent(event);
                    addEventMarker(venue, event, shouldShow);
                });
            });
            
            map.invalidateSize();
        }

        function addEventMarker(venue, event, visible = true) {
            const markerId = `event-${event.id}`;
            const eventDate = new Date(event.date);
            
            const marker = L.marker([venue.lat, venue.lng], {
                opacity: visible ? 1 : 0.3
            }).addTo(map);
            
            const popupHtml = `
                <div class="event-popup">
                    <h3>${event.name}</h3>
                    <p class="event-popup-venue">${venue.name}</p>
                    <p class="event-popup-date">${eventDate.toLocaleDateString('es-MX')} · ${eventDate.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' })}</p>
                    ${event.links.instagram ? `<a href="${event.links.instagram}" target="_blank" class="event-popup-link">Instagram →</a>` : ''}
                    ${event.links.facebook ? `<a href="${event.links.facebook}" target="_blank" class="event-popup-link">Facebook →</a>` : ''}
                </div>
            `;
            
            marker.bindPopup(popupHtml);
            
            // Store marker icon element for highlighting
            const markerIcon = marker.getElement();
            
            markers[markerId] = { marker, event, venue, visible, markerIcon };
        }

        function filterEvent(event) {
            const today = new Date('2026-03-28');
            today.setHours(0, 0, 0, 0);
            
            const eventDate = new Date(event.date);
            eventDate.setHours(0, 0, 0, 0);
            
            const weekEnd = new Date(today);
            weekEnd.setDate(weekEnd.getDate() + 6);
            
            if (currentFilter === 'all') return true;
            if (currentFilter === 'today') return eventDate.getTime() === today.getTime();
            if (currentFilter === 'week') return eventDate >= today && eventDate <= weekEnd;
            
            return true;
        }

        function updateEventFilters(filter) {
            currentFilter = filter;
            
            document.querySelectorAll('.btn-filter').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.filter === filter);
            });
            
            if (map) {
                Object.keys(markers).forEach(markerId => {
                    const { marker, event } = markers[markerId];
                    const shouldShow = filterEvent(event);
                    marker.setOpacity(shouldShow ? 1 : 0.3);
                    if (!shouldShow) {
                        marker.closePopup();
                    }
                });
            }
            
            updateEventsList();
        }

        function updateEventsList() {
            const eventsInfo = document.getElementById('eventsInfo');
            const visibleEvents = [];
            
            venues.forEach(venue => {
                venue.events.forEach(event => {
                    if (filterEvent(event)) {
                        visibleEvents.push({ ...event, venueName: venue.name });
                    }
                });
            });
            
            visibleEvents.sort((a, b) => new Date(a.date) - new Date(b.date));
            
            if (visibleEvents.length === 0) {
                eventsInfo.innerHTML = '<p style="text-align: center; opacity: 0.6; padding: 1rem;">No events match the selected filter</p>';
                return;
            }
            
            eventsInfo.innerHTML = visibleEvents.map(event => {
                const eventDate = new Date(event.date);
                return `
                    <div class="event-item-compact" data-event-id="${event.id}">
                        <h4>${event.name}</h4>
                        <p>${event.venueName}</p>
                        <p>${eventDate.toLocaleDateString('es-MX')} · ${eventDate.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' })}</p>
                    </div>
                `;
            }).join('');
            
            // Add click handlers to event items
            document.querySelectorAll('.event-item-compact').forEach(item => {
                item.addEventListener('click', () => {
                    const eventId = parseInt(item.dataset.eventId);
                    highlightEventMarker(eventId);
                    
                    // Update active state
                    document.querySelectorAll('.event-item-compact').forEach(el => {
                        el.classList.remove('active');
                    });
                    item.classList.add('active');
                });
            });
        }
        
        function highlightEventMarker(eventId) {
            // Remove highlight from all markers
            Object.keys(markers).forEach(markerId => {
                const markerIcon = markers[markerId].markerIcon;
                if (markerIcon) {
                    markerIcon.classList.remove('highlight-marker');
                }
            });
            
            // Highlight the selected marker
            const markerId = `event-${eventId}`;
            if (markers[markerId]) {
                const markerIcon = markers[markerId].markerIcon;
                if (markerIcon) {
                    markerIcon.classList.add('highlight-marker');
                }
                markers[markerId].marker.openPopup();
            }
        }

        // ============================================
        // SONGS PAGE RENDERING
        // ============================================
        
        function renderTracks() {
            const tracksList = document.getElementById('tracksList');
            tracksList.innerHTML = mockTracks.map((track, index) => `
                <div class="track-item" data-id="${track.id}" data-index="${index}">
                    <div class="track-title">${track.title}</div>
                    <div class="track-artist">${track.artist}</div>
                    <div class="track-number">#${index + 1}</div>
                </div>
            `).join('');

            document.getElementById('trackCount').textContent = `${mockTracks.length} tracks`;
        }

        function renderTrackDetail(trackId) {
            const track = mockTracks.find(t => t.id === trackId);
            if (!track) return;

            const detailPanel = document.getElementById('detailPanel');
            const coverUrl = track.coverArts?.[0]?.href;
            
            const coverHtml = coverUrl 
                ? `<img src="${coverUrl}" alt="${track.album}" class="cover-art" onerror="this.replaceWith(createPlaceholder())" />`
                : `<div class="cover-placeholder">No Cover Available</div>`;
            
            const tidal_id = track.tidal_id;
            const playerHtml = tidal_id ? `
                <div class="tidal-player-container">
                    <label class="player-label">Play on Tidal</label>
                    <div class="tidal-embed-wrapper">
                        <iframe src="https://embed.tidal.com/tracks/${tidal_id}" width="100%" height="120" allow="encrypted-media; fullscreen; clipboard-write https://embed.tidal.com; web-share" sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-popups-to-escape-sandbox" style="color-scheme: dark" title="TIDAL Embed Player"></iframe>
                    </div>
                </div>
            ` : '';

            detailPanel.innerHTML = `
                <div class="track-detail">
                    <div class="cover-art-container">
                        ${coverHtml}
                    </div>
                    <div class="track-meta">
                        <h2>${track.title}</h2>
                        <div class="meta-row">
                            <div class="meta-label">Artist</div>
                            <div class="meta-value">${track.artist}</div>
                        </div>
                        <div class="meta-row">
                            <div class="meta-label">Album</div>
                            <div class="meta-value">${track.album}</div>
                        </div>
                        <div class="meta-row">
                            <div class="meta-label">Order</div>
                            <div class="meta-value">#${mockTracks.indexOf(track) + 1}</div>
                        </div>
                    </div>
                    ${playerHtml}
                </div>
            `;
        }

        // ============================================
        // EVENT HANDLERS
        // ============================================
        
        function setupEventListeners() {
            // Page navigation
            document.querySelectorAll('.nav-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    switchPage(link.dataset.page);
                });
            });
            
            // Track selection
            document.getElementById('tracksList').addEventListener('click', (e) => {
                const trackItem = e.target.closest('.track-item');
                if (!trackItem) return;

                const trackId = parseInt(trackItem.dataset.id);
                selectTrack(trackId);
            });

            // Event filters
            document.addEventListener('click', (e) => {
                if (e.target.classList.contains('btn-filter')) {
                    e.preventDefault();
                    updateEventFilters(e.target.dataset.filter);
                }
            });

            // Modal handlers
            document.getElementById('clubInfoBtn').addEventListener('click', (e) => {
                e.preventDefault();
                openModal();
            });

            document.getElementById('donateBtn').addEventListener('click', (e) => {
                e.preventDefault();
                alert('Patreon coming soon! Follow our Instagram for updates.');
            });

            // Modal close on background click
            document.getElementById('clubModal').addEventListener('click', (e) => {
                if (e.target.id === 'clubModal') {
                    closeModal();
                }
            });
        }

        function selectTrack(trackId) {
            selectedTrackId = trackId;
            
            // Update active state in list
            document.querySelectorAll('.track-item').forEach(item => {
                item.classList.toggle('active', parseInt(item.dataset.id) === trackId);
            });

            // Render detail
            renderTrackDetail(trackId);

            // On mobile, show detail panel overlay
            if (window.innerWidth < 768) {
                const detailPanel = document.getElementById('detailPanel');
                detailPanel.classList.add('open');
                
                // Insert close button for mobile
                if (!detailPanel.querySelector('.detail-close')) {
                    const closeDiv = document.createElement('div');
                    closeDiv.className = 'detail-close';
                    closeDiv.innerHTML = `
                        <h3>Track Details</h3>
                        <button class="close-btn" onclick="closeDetailPanel()">×</button>
                    `;
                    detailPanel.insertBefore(closeDiv, detailPanel.firstChild);
                }
            }
        }

        function closeDetailPanel() {
            if (window.innerWidth < 768) {
                document.getElementById('detailPanel').classList.remove('open');
                document.querySelectorAll('.track-item').forEach(item => {
                    item.classList.remove('active');
                });
                selectedTrackId = null;
            }
        }

        function openModal() {
            document.getElementById('clubModal').classList.add('open');
        }

        function closeModal() {
            document.getElementById('clubModal').classList.remove('open');
        }

        function createPlaceholder() {
            const placeholder = document.createElement('div');
            placeholder.className = 'cover-placeholder';
            placeholder.textContent = 'No Cover';
            return placeholder;
        }

        // ============================================
        // RESPONSIVE HANDLING
        // ============================================
        
        window.addEventListener('resize', () => {
            if (window.innerWidth >= 768) {
                document.getElementById('detailPanel').classList.remove('open');
                document.querySelectorAll('.detail-close').forEach(el => el.remove());
                if (selectedTrackId) {
                    renderTrackDetail(selectedTrackId);
                }
            }
            
            if (map) {
                setTimeout(() => map.invalidateSize(), 100);
            }
        });

        // ============================================
        // START
        // ============================================
        
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
